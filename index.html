            {

                weather: "15°C (59°F). Colder at summit.",
                activities: [
                    { time: "10:00 AM", title: "Mt. Usu Ropeway", category: "Sightseeing", desc: "Active volcano views. Gear: Hiking Boots.", url: "https://usuzan.hokkaido.jp/en/", icon: "hiking", gear: "Hiking Boots Required. Thermal fleece layer", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuCkc1YLFi6LerS9184D1xRZBpm1W9FWrVNZHMhCgwCXFzV6SymAiN0F7NlFSxAz3f1SD4RnvOi0d5fAlixrKWscNwcPiimJqbu_Lf8R-1-aL2Ls8JTz8sdVmAYKOFsZZChDVvDuCye3BUEC6BJxR_QY7O6HIbtmHaRc22gxkOE2N-XQtVgONrQOjpcNn11esjKq6HGs1nEXp-5MuVmVu5oJYDXpIPANB8bqjefGHx2cYvc2P4TzZwNXGMiszFBdHUdgWotJoD7vYM8" },
                    { time: "12:30 PM", title: "Sendouan Wagyu", category: "Food", desc: "Lakefront dining featuring Hokkaido beef and panoramic views.", url: "https://www.wakasaimo.com/shop/sendouan/", icon: "water" },
                    { time: "03:30 PM", title: "Lake Shikotsu", category: "Sightseeing", desc: "Crystal clear caldera lake visit. Serene nature at its best.", icon: "waves", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuDAMIfo4opo91D9WxkhtUH-JanqwrxrkGK21F4lPQrVf1wXmQZ5oKDApuur8QDdz2gWdRj2Q4hK892--TvfJNGw6lsjqcq7Z3ocl0d1ERENG0gC0lKOI9VgwjI_uiRy2d-clxG22zobQZcoW3bwmEsY7j2J3cNxWfhzzDCJjhpRXw5fgOekcY0uyqONApj5aGRMpFOaQC7SUMf7k6ViTo8VbmnFbih-TBdBFtFHOxhry3cZFYzjLkvqZUS1SoZ2ZV83G-xX63WUxoU" }
                ]
            },
            {
                day: 7,
                date: "May 30",
                location: "Departure",
                sleep: "Home",
                weather: "20°C (68°F). Mild.",
                activities: [
                    { time: "11:00 AM", title: "Aeon Mall Chitose", category: "Shopping", desc: "Last-minute souvenir shopping for local snacks and goods.", icon: "mall", gear: "Comfortable flight layers", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuB0in_1cI3xhT4Qn_Gmpw-ydlJLEH1S71A3JKVNbyYzbggyNa2P9zw8c_o3qBBYEVeZ3_um2OB3lW-q_T8-wb0CUB-yayA1cgl_Em9Rq4KNxFzekcd69x0gR9iYdgzOH3C4BXtr-zH_pAnDDYfgNxRdKgzmIWzD8WfCliTRptrQ9CgpIa55G3fMo6rAg6oHYA-h2-KZ5bLUpV3YVSHEzPk7TBd73G8M9X2oGcC8NqColNAqvwsN2kLMOjtnjaHW71TKVUBc3x610Qk" },
                    { time: "01:00 PM", title: "Royce' Chocolate World", category: "Food", desc: "The whimsical world of chocolate at the airport. Watch the machines in action.", icon: "cookie", gear: "Comfortable flight layers", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuDJkVmUZxwoCq_xIlJdnBk7E6OSRCdtYDLdIeEUlG2jF1LFrflu7ga-h-h3DJUbBMpjtOSg_kNPvFakdq9YYeGUugT8hUSrewzv2X2QO_OEUWCKxdr2TiJrcB1ZVIIUHuiXFjWltRWmXBkzRxvT90YeROZEp9qWEntwV9AfsvM_NnDPVSA-rm-JJ-K5ZIPUI6NvosuEeDdg85vD1NWLZs-Y0n-TE2O_amJDPE0VFHTAg2fRGUrnUi6t0MTO-t_CbcjKRxWGf59UJwI" },
                    { time: "07:00 PM", title: "Flight Departure", category: "Logistics", desc: "Evening flight back home. End of journey.", icon: "flight_takeoff", gear: "Comfortable flight layers" }
                ]
            }
        ];

        let currentDay = 'all';
        let currentFilter = 'all';

        function init() {
            renderTabs();
            renderActivities();
            updateSidebar();
        }

        function renderTabs() {
            const container = document.getElementById('day-tabs-container');
            const allTab = `
                <button onclick="setDay('all')" class="flex-shrink-0 px-6 py-4 rounded-xl border border-outline-variant/30 text-left transition-all ${currentDay === 'all' ? 'bg-primary text-on-primary ring-4 ring-primary/10 border-primary' : 'bg-surface hover:bg-surface-variant/50'}">
                    <div class="font-label-sm text-label-sm opacity-70 uppercase">Overview</div>
                    <div class="font-bold text-lg">Whole Trip</div>
                    <div class="text-xs truncate max-w-[80px]">7 Days</div>
                </button>
            `;
            
            const dayTabs = itineraryData.map(d => `
                <button onclick="setDay(${d.day})" class="flex-shrink-0 px-6 py-4 rounded-xl border border-outline-variant/30 text-left transition-all ${currentDay === d.day ? 'bg-primary text-on-primary ring-4 ring-primary/10 border-primary' : 'bg-surface hover:bg-surface-variant/50'}">
                    <div class="font-label-sm text-label-sm opacity-70 uppercase">Day ${d.day}</div>
                    <div class="font-bold text-lg">${d.date}</div>
                    <div class="text-xs truncate max-w-[80px]">${d.location}</div>
                </button>
            `).join('');

            container.innerHTML = allTab + dayTabs;
        }

        function setDay(day) {
            currentDay = day;
            renderTabs();
            renderActivities();
            updateSidebar();
            
            if (day !== 'all') {
                const target = document.getElementById(`day-section-${day}`);
                if (target) {
                    window.scrollTo({
                        top: target.offsetTop - 120,
                        behavior: 'smooth'
                    });
                }
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function filterActivities(category) {
            currentFilter = category;
            
            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.classList.remove('filter-active');
            });
            
            const categoryNames = {
                'all': '✨ All',
                'Sightseeing': '🏔️ Sightseeing',
                'Food': '🍣 Food',
                'Shopping': '🛍️ Shopping',
                'Logistics': '🚗 Logistics'
            };

            const activeBtn = Array.from(document.querySelectorAll('.filter-pill')).find(b => b.innerText.includes(categoryNames[category]));
            if (activeBtn) activeBtn.classList.add('filter-active');
            
            renderActivities();
        }

        function getActivityHtml(act, index) {
            return `
                <div class="activity-card group bg-surface-container-lowest overflow-hidden rounded-xl border border-outline-variant/20 hover:border-primary/30 transition-all hover:shadow-lg animate-in fade-in slide-in-from-bottom-4 duration-300" style="animation-delay: ${index * 50}ms">
                    <div class="flex flex-col md:flex-row h-full">
                        ${act.img ? `
                        <div class="md:w-1/3 relative h-48 md:h-auto overflow-hidden bg-surface-container">
                            <img src="${act.img}" alt="${act.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                        </div>
                        ` : ''}
                        <div class="p-6 flex-grow flex flex-col justify-between">
                            <div>
                                <div class="flex items-center justify-between mb-3">
                                    <div class="flex items-center gap-2">
                                        <span class="px-2.5 py-1 rounded-lg text-[11px] font-bold uppercase tracking-wider ${getCategoryStyles(act.category)}">
                                            ${getCategoryEmoji(act.category)} ${act.category}
                                        </span>
                                        ${act.gear ? `
                                        <span class="px-2.5 py-1 rounded-lg text-[11px] font-bold uppercase tracking-wider bg-tertiary-fixed text-on-tertiary-fixed-variant flex items-center gap-1">
                                            <span class="material-symbols-outlined text-[14px]" data-icon="apparel">apparel</span> ${act.gear}
                                        </span>
                                        ` : ''}
                                    </div>
                                    <span class="font-label-md text-label-md font-bold text-primary flex items-center gap-1.5">
                                        <span class="material-symbols-outlined text-[18px]" data-icon="schedule">schedule</span> ${act.time}
                                    </span>
                                </div>
                                <h4 class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors mb-2">${act.title}</h4>
                                <p class="text-on-surface-variant text-body-md line-clamp-3">${act.desc}</p>
                            </div>
                            
                            <div class="mt-6 flex items-center justify-between">
                                <div class="flex gap-3">
                                    ${act.url ? `
                                        <a href="${act.url}" target="_blank" class="flex items-center gap-2 text-primary font-label-md text-label-md hover:bg-primary/5 px-3 py-1.5 rounded-lg border border-primary/20 transition-all">
                                            <span class="material-symbols-outlined text-[18px]" data-icon="language">language</span> Official Website
                                        </a>
                                    ` : ''}
                                </div>
                                <div class="flex items-center gap-4 text-on-surface-variant/40">
                                    <span class="material-symbols-outlined hover:text-tertiary transition-colors cursor-help" title="Weather: Sunny">sunny</span>
                                    <span class="material-symbols-outlined hover:text-primary transition-colors cursor-help" title="Condition: Cool">ac_unit</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderActivities() {
            const container = document.getElementById('activity-list');
            let content = '';

            const displayData = currentDay === 'all' ? itineraryData : [itineraryData.find(d => d.day === currentDay)];

            displayData.forEach(dayData => {
                const filteredActivities = currentFilter === 'all' 
                    ? dayData.activities 
                    : dayData.activities.filter(a => a.category === currentFilter);

                if (filteredActivities.length > 0) {
                    content += `
                        <div id="day-section-${dayData.day}" class="fade-in-up">
                            <div class="sticky top-20 bg-background/95 backdrop-blur z-20 py-4 flex items-center justify-between mb-6 border-b border-outline-variant/20">
                                <div class="flex items-baseline gap-4">
                                    <h3 class="font-headline-md text-headline-md text-primary">Day ${dayData.day}: ${dayData.date}</h3>
                                    <span class="text-on-surface-variant font-label-md text-label-md uppercase tracking-wider">${dayData.location}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="material-symbols-outlined text-outline text-[20px]" data-icon="thermostat">thermostat</span>
                                    <div class="text-right">
                                        <div class="text-sm font-semibold text-on-surface">${dayData.weather}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="space-y-6">
                                ${filteredActivities.map((act, idx) => getActivityHtml(act, idx)).join('')}
                            </div>
                            <div class="mt-8 bg-surface-container-low/30 p-4 rounded-xl border border-dashed border-outline-variant/40 flex flex-wrap items-center justify-center gap-x-8 gap-y-2 no-print">
                                <div class="flex items-center gap-2 text-on-surface-variant text-sm font-medium">
                                    <span class="material-symbols-outlined text-[18px]" data-icon="check_circle">check_circle</span> Daily Progress
                                </div>
                                <div class="flex items-center gap-2 text-on-surface-variant text-sm font-medium">
                                    <span class="material-symbols-outlined text-[18px]" data-icon="apparel">apparel</span> 
                                    Daily Wear: ${dayData.day === 6 ? 'Hiking Boots Required' : (dayData.day === 7 ? 'Comfortable Flight Layers' : 'City Casual & Light Layers')}
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            container.innerHTML = content || `
                <div class="py-20 text-center border-2 border-dashed border-outline-variant rounded-xl fade-in-up">
                    <span class="material-symbols-outlined text-outline-variant text-5xl mb-4" data-icon="search_off">search_off</span>
                    <p class="text-on-surface-variant font-body-lg">No matching activities found for the selected filter.</p>
                </div>
            `;
        }

        function updateSidebar() {
            const logisticsContainer = document.getElementById('logistics-content');
            
            if (currentDay === 'all') {
                const uniqueHotels = [...new Set(itineraryData.map(d => d.sleep))];
                logisticsContainer.innerHTML = `
                    <div>
                        <label class="font-label-md text-label-md text-on-surface-variant block mb-4 uppercase tracking-tighter">TRIP ACCOMMODATIONS</label>
                        <div class="space-y-4">
                            ${uniqueHotels.map(hotel => `
                                <div class="flex items-start gap-4 p-4 bg-surface-bright rounded-lg border border-outline-variant/20 shadow-sm transition-transform hover:-translate-y-1">
                                    <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container shrink-0">
                                        <span class="material-symbols-outlined text-[20px]" data-icon="bed">bed</span>
                                    </div>
                                    <div>
                                        <p class="font-body-md font-semibold text-on-surface">${hotel}</p>
                                        <p class="text-on-surface-variant text-xs">${hotel === 'Home' ? 'Return Trip' : 'Confirmed Booking'}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="pt-6 border-t border-outline-variant/30">
                        <label class="font-label-md text-label-md text-on-surface-variant block mb-4 uppercase tracking-tighter">GENERAL INFO</label>
                        <div class="bg-surface-bright p-5 rounded-lg border border-outline-variant/20 space-y-4 shadow-sm">
                            <div class="flex items-center justify-between">
                                <span class="flex items-center gap-2 text-sm font-medium">
                                    <span class="material-symbols-outlined text-on-surface-variant text-[18px]" data-icon="credit_card">credit_card</span> ETC Card
                                </span>
                                <span class="text-tertiary font-bold text-[10px] bg-tertiary-fixed px-2 py-0.5 rounded uppercase tracking-wider">Required</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="flex items-center gap-2 text-sm font-medium">
                                    <span class="material-symbols-outlined text-on-surface-variant text-[18px]" data-icon="event_repeat">event_repeat</span> Daily Start
                                </span>
                                <span class="text-on-surface font-semibold text-sm">9:00 AM Sharp</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="flex items-center gap-2 text-sm font-medium">
                                    <span class="material-symbols-outlined text-on-surface-variant text-[18px]" data-icon="calendar_month">calendar_month</span> Duration
                                </span>
                                <span class="text-on-surface font-semibold text-sm">7 Days Total</span>
                            </div>
                        </div>
                    </div>
                    <button class="w-full py-4 bg-secondary text-on-secondary rounded-lg font-label-md text-label-md hover:opacity-90 hover:shadow-lg transition-all flex items-center justify-center gap-2 active:scale-95 no-print">
                        <span class="material-symbols-outlined text-[20px]" data-icon="edit_note">edit_note</span> Add Trip Note
                    </button>
                `;
            } else {
                const dayData = itineraryData.find(d => d.day === currentDay);
                logisticsContainer.innerHTML = `
                    <div class="fade-in-up">
                        <label class="font-label-md text-label-md text-on-surface-variant block mb-3 uppercase tracking-tighter">WHERE TO SLEEP (DAY ${dayData.day})</label>
                        <div class="flex items-start gap-4 p-5 bg-surface-bright rounded-lg border border-outline-variant/30 shadow-sm">
                            <div class="w-12 h-12 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container">
                                <span class="material-symbols-outlined text-[24px]" data-icon="bed">bed</span>
                            </div>
                            <div>
                                <p class="font-body-lg text-body-lg font-semibold text-on-surface">${dayData.sleep}</p>
                                <p class="text-on-surface-variant text-sm">Confirmed Reservation</p>
                            </div>
                        </div>
                    </div>
                    <div class="fade-in-up">
                        <label class="font-label-md text-label-md text-on-surface-variant block mb-3 uppercase tracking-tighter">WEATHER & CLOTHING</label>
                        <div class="flex flex-col gap-3 p-4 bg-tertiary-fixed/20 rounded-lg border border-tertiary/10">
                            <div class="flex items-center gap-4">
                                <span class="material-symbols-outlined text-tertiary text-[24px]" data-icon="wb_sunny">wb_sunny</span>
                                <span class="font-body-md text-body-md font-semibold text-tertiary">${dayData.weather}</span>
                            </div>
                        </div>
                    </div>
                    <div class="pt-6 border-t border-outline-variant/30 fade-in-up">
                        <label class="font-label-md text-label-md text-on-surface-variant block mb-4 uppercase tracking-tighter">CAR & TRANSPORT</label>
                        <div class="bg-surface-bright p-5 rounded-lg border border-outline-variant/20 space-y-4 shadow-sm">
                            <div class="flex items-center justify-between">
                                <span class="flex items-center gap-2 text-sm font-medium">
                                    <span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="credit_card">credit_card</span> ETC Card
                                </span>
                                <span class="text-tertiary font-bold text-[10px] bg-tertiary-fixed px-2 py-0.5 rounded uppercase tracking-wider">REQUIRED</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="flex items-center gap-2 text-sm font-medium">
                                    <span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="event_available">event_available</span> Daily Start
                                </span>
                                <span class="text-on-surface font-semibold text-sm">9:00 AM</span>
                            </div>
                        </div>
                    </div>
                    <button class="w-full py-4 bg-secondary text-on-secondary rounded-lg font-label-md text-label-md hover:opacity-90 hover:shadow-lg transition-all flex items-center justify-center gap-2 active:scale-95 no-print">
                        <span class="material-symbols-outlined text-[20px]" data-icon="edit_note">edit_note</span> Add Trip Note
                    </button>
                `;
            }
        }

        function getCategoryStyles(cat) {
            switch(cat) {
                case 'Sightseeing': return 'bg-primary-fixed text-on-primary-fixed-variant';
                case 'Food': return 'bg-tertiary-fixed text-on-tertiary-fixed-variant';
                case 'Shopping': return 'bg-secondary-fixed text-on-secondary-fixed-variant';
                case 'Logistics': return 'bg-surface-variant text-on-surface-variant';
                default: return 'bg-surface-variant text-on-surface-variant';
            }
        }

        function getCategoryEmoji(cat) {
            switch(cat) {
                case 'Sightseeing': return '🏔️';
                case 'Food': return '🍣';
                case 'Shopping': return '🛍️';
                case 'Logistics': return '🚗';
                default: return '✨';
            }
        }

        window.onload = init;
    </script>
</body></html>
